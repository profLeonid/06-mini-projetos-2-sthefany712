<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contador</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="./contador.js" defer type="module"></script> <!--depois q cria o module ele não deixa chamar as funções pelo console-->
</head>
<body>

  <div class="container">

    <a href="../index.html">← Voltar</a>

    <h1>Contador</h1>
    <p>Informe a quantidade de termos para gerar cada sequência.</p>

    <div class="campo">
      <label>Quantidade</label>
      <input id="quantidade" type="number" placeholder="Ex: 5"/>
    </div>

    <button id="gerarNumeros">Gerar</button> <!-- (prof trocou por duvida de colegas) mas usa-se handleClick() poderia ser qualquer nome mas uso handleClick como padrão, porém, ele não é uma função do js. Estou criando para chamar todas as funções-->
    <!--depois q cria o module ele não deixa chamar usar o onclick também, por isso criei um ID-->

    <div class="resultado">
      <p class="resultado-titulo">Resultado</p>
      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>Contagem</th>
              <th>Pares</th>
              <th>Ímpares</th>
              <th>Múlt. de 5</th>
              <th>Potências de 2</th>
            </tr>
          </thead>
              <tbody id="tabela">
          </tbody>
        </table>
      </div>
    </div>

  </div>

</body>
</html>
