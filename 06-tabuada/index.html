<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tabuada Estendida</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="./tabuada.js" defer type="module"></script> 
  
  <!--O defer é um atributo HTML usado na tag <script> para adiar a execução de um arquivo JavaScript externo até que o documento HTML seja totalmente analisado, sem bloquear a renderização da página. Ele permite o download do script em paralelo (assíncrono) e garante a execução na ordem em que aparecem.

    Enquanto o defer aguarda o final da renderização para executar, o async executa o script assim que o download termina, podendo interromper a análise do HTML. O defer é o mais indicado quando a ordem de execução importa e a interação com o DOM é necessária.-->

</head>
<body>

  <div class="container">

    <a href="../index.html">← Voltar</a>

    <h1>Tabuada Estendida</h1>
    <p>Informe um número para gerar as operações de 1 a 10.</p>

    <div class="campo">
      <label>Número</label>
      <input id="quantidade" type="number" placeholder="Ex: 7"/>
    </div>

    <button id="gerarTabuada" >Gerar Tabuada</button>

    <div class="resultado">
      <p class="resultado-titulo">Resultado</p>
      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>N</th>
              <th>Adição</th>
              <th>Subtração</th>
              <th>Multiplicação</th>
              <th>Divisão</th>
            </tr>
          </thead>
          <tbody id="tabela" >
            <tr>
              <td>1</td>
              <td>8</td>
              <td>6</td>
              <td>7</td>
              <td>7.00</td>
            </tr>
            <tr>
              <td>2</td>
              <td>9</td>
              <td>5</td>
              <td>14</td>
              <td>3.50</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

</body>
</html>
